<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f5f5f3; --surface: #ffffff; --border: #e4e4e0;
      --text:    #1a1a18; --muted:   #6b6b66; --accent: #4f46e5;
      --accent-h:#4338ca; --radius:  12px;    --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:var(--bg); color:var(--text); height:100vh;
           display:flex; flex-direction:column; }

    /* header */
    header { background:var(--surface); border-bottom:1px solid var(--border);
             padding:14px 24px; display:flex; align-items:center;
             justify-content:space-between; flex-shrink:0; }
    .header-left { display:flex; align-items:center; gap:10px; }
    .avatar { width:36px; height:36px; background:var(--accent); border-radius:50%;
              display:flex; align-items:center; justify-content:center;
              font-size:16px; color:#fff; }
    header h1 { font-size:15px; font-weight:600; }
    header p  { font-size:12px; color:var(--muted); margin-top:1px; }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#22c55e;
                  animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .btn-ghost { background:none; border:1px solid var(--border); border-radius:8px;
                 padding:6px 12px; font-size:12px; color:var(--muted);
                 cursor:pointer; transition:all .15s; }
    .btn-ghost:hover { background:var(--bg); color:var(--text); }

    /* quick bar */
    .quick-bar { display:flex; gap:8px; padding:10px 20px;
                 border-bottom:1px solid var(--border); background:var(--surface);
                 overflow-x:auto; flex-shrink:0; }
    .quick-btn { white-space:nowrap; background:var(--bg); border:1px solid var(--border);
                 border-radius:20px; padding:5px 14px; font-size:12px; color:var(--muted);
                 cursor:pointer; transition:all .15s; }
    .quick-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* messages */
    #messages { flex:1; overflow-y:auto; padding:20px;
                display:flex; flex-direction:column; gap:16px; }
    .msg { display:flex; gap:10px; max-width:780px;
           animation:fadeUp .2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .msg.user  { align-self:flex-end;   flex-direction:row-reverse; }
    .msg.bot   { align-self:flex-start; }
    .msg-avatar { width:30px; height:30px; border-radius:50%;
                  display:flex; align-items:center; justify-content:center;
                  font-size:13px; flex-shrink:0; margin-top:2px; }
    .msg.user .msg-avatar { background:var(--accent); color:#fff; }
    .msg.bot  .msg-avatar { background:var(--border);  color:var(--muted); }
    .bubble { padding:11px 15px; border-radius:var(--radius);
              font-size:14px; line-height:1.65; max-width:660px;
              white-space:pre-wrap; word-break:break-word; box-shadow:var(--shadow); }
    .msg.user .bubble { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
    .msg.bot  .bubble { background:var(--surface); color:var(--text);
                        border:1px solid var(--border); border-bottom-left-radius:4px; }
    .msg-time { font-size:10px; color:var(--muted); margin-top:4px; }
    .msg.user .msg-time { text-align:right; }

    /* agent badge */
    .agent-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px;
                   border-radius:4px; padding:2px 7px; margin-bottom:5px;
                   font-weight:600; letter-spacing:.3px; }
    .badge-email    { background:#dbeafe; color:#1d4ed8; }
    .badge-meeting  { background:#ede9fe; color:#5b21b6; }
    .badge-summary  { background:#dcfce7; color:#166534; }
    .badge-safety   { background:#fef9c3; color:#854d0e; }
    .badge-general  { background:#f3f4f6; color:#374151; }

    /* typing */
    .typing .bubble { padding:14px 18px; }
    .dots { display:flex; gap:5px; }
    .dots span { width:7px; height:7px; border-radius:50%; background:var(--muted);
                 animation:bounce .9s infinite; }
    .dots span:nth-child(2){animation-delay:.15s}
    .dots span:nth-child(3){animation-delay:.30s}
    @keyframes bounce{0%,80%,100%{transform:scale(1)}40%{transform:scale(1.3)}}

    /* input */
    .input-bar { background:var(--surface); border-top:1px solid var(--border);
                 padding:14px 20px; display:flex; gap:10px; align-items:flex-end;
                 flex-shrink:0; }
    #user-input { flex:1; resize:none; border:1px solid var(--border);
                  border-radius:10px; padding:10px 14px; font-size:14px;
                  font-family:inherit; color:var(--text); background:var(--bg);
                  outline:none; max-height:120px; line-height:1.5;
                  transition:border-color .15s; }
    #user-input:focus { border-color:var(--accent); }
    #user-input::placeholder { color:var(--muted); }
    #send-btn { width:40px; height:40px; border-radius:10px; background:var(--accent);
                border:none; cursor:pointer; display:flex; align-items:center;
                justify-content:center; flex-shrink:0; transition:background .15s; }
    #send-btn:hover { background:var(--accent-h); }
    #send-btn svg { stroke:#fff; }

    /* empty state */
    .empty-state { text-align:center; margin:auto; padding:40px 20px; }
    .empty-state .icon { font-size:42px; margin-bottom:12px; }
    .empty-state h2 { font-size:18px; margin-bottom:6px; }
    .empty-state p  { font-size:13px; color:var(--muted);
                      max-width:340px; margin:0 auto; }

    /* agent status bar */
    .agent-status { display:flex; gap:12px; padding:8px 20px; font-size:11px;
                    color:var(--muted); background:var(--surface);
                    border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
    .agent-pill { background:var(--bg); border:1px solid var(--border);
                  border-radius:20px; padding:3px 10px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="avatar">🤖</div>
    <div>
      <h1>Personal Assistant</h1>
      <p>5-Agent System · Email · Calendar · Research</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </div>
  <button class="btn-ghost" onclick="clearChat()">Clear chat</button>
</header>

<!-- agent status pills -->
<div class="agent-status">
  <span>Agents:</span>
  <span class="agent-pill">🎯 Orchestrator</span>
  <span class="agent-pill">📧 Email</span>
  <span class="agent-pill">🔍 Research</span>
  <span class="agent-pill">📝 Meeting Brief</span>
  <span class="agent-pill">🛡️ Safety</span>
</div>

<div class="quick-bar">
  <button class="quick-btn" onclick="sendQuick('Check my unread emails')">📧 Check emails</button>
  <button class="quick-btn" onclick="sendQuick('What meetings do I have today?')">📅 Today\'s meetings</button>
  <button class="quick-btn" onclick="sendQuick('Prepare a brief for my next meeting')">📝 Meeting brief</button>
  <button class="quick-btn" onclick="sendQuick('Give me a daily summary')">📊 Daily summary</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty">
    <div class="icon">✨</div>
    <h2>How can I help today?</h2>
    <p>Ask me to check your inbox, prepare a meeting brief with research, or give you a daily summary.</p>
  </div>
</div>

<div class="input-bar">
  <textarea id="user-input" rows="1" placeholder="Ask me anything…"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMessage()" title="Send">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
const API       = "";
let isWaiting   = false;

async function sendMessage() {
  const input = document.getElementById("user-input");
  const text  = input.value.trim();
  if (!text || isWaiting) return;
  hideEmpty();
  appendMsg("user", text, "");
  input.value = ""; autoResize(input);
  const typingId = showTyping();
  isWaiting = true;
  try {
    const res  = await fetch(`${API}/chat`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message: text}),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Server error"); }
    const data = await res.json();
    removeTyping(typingId);
    appendMsg("bot", data.response, data.task_type || "general");
  } catch(e) {
    removeTyping(typingId);
    appendMsg("bot", `⚠️ ${e.message}`, "general");
  } finally { isWaiting = false; }
}

function sendQuick(text) {
  document.getElementById("user-input").value = text;
  sendMessage();
}

async function clearChat() {
  await fetch(`${API}/reset`, {method:"POST"});
  document.getElementById("messages").innerHTML =
    `<div class="empty-state" id="empty">
      <div class="icon">✨</div>
      <h2>How can I help today?</h2>
      <p>Ask me to check your inbox, prepare a meeting brief, or give you a daily summary.</p>
    </div>`;
}

function appendMsg(role, text, taskType) {
  const container = document.getElementById("messages");
  const now = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const badge = role === "bot" ? agentBadge(taskType) : "";
  div.innerHTML = `
    <div class="msg-avatar">${role==="user"?"U":"🤖"}</div>
    <div>
      ${badge}
      <div class="bubble">${escapeHtml(text)}</div>
      <div class="msg-time">${now}</div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function agentBadge(taskType) {
  const map = {
    email:   ["badge-email",   "📧 Email Agent"],
    meeting: ["badge-meeting", "📝 Meeting Brief Agent · 🔍 Research Agent · 🛡️ Safety Agent"],
    summary: ["badge-summary", "📊 Summary"],
    general: ["badge-general", "🎯 Orchestrator"],
    travel:  ["badge-general", "✈️ Travel"],
  };
  const [cls, label] = map[taskType] || map.general;
  return `<span class="agent-badge ${cls}">${label}</span><br>`;
}

function showTyping() {
  const c = document.getElementById("messages");
  const id = "typing-" + Date.now();
  const d  = document.createElement("div");
  d.className = "msg bot typing"; d.id = id;
  d.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="bubble"><div class="dots">
      <span></span><span></span><span></span>
    </div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
  return id;
}

function removeTyping(id) { const e=document.getElementById(id); if(e) e.remove(); }
function hideEmpty()      { const e=document.getElementById("empty"); if(e) e.remove(); }
function handleKey(e)     { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el)   { el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,120)+"px"; }
function escapeHtml(t)    {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}
</script>
</body>
</html>
